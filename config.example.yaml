# =============================================================================
# config.example.yaml — 設定範本
#
# 使用方式：
#   複製此檔案為 config.yaml，再依說明填入正確值。
#   Windows: copy config.example.yaml config.yaml
#   macOS/Linux: cp config.example.yaml config.yaml
#
# 安全提醒：
#   - config.yaml 已列入 .gitignore，不會被提交至版本控制
#   - 務必將 auth.default_admin_password 改為強密碼
#   - 務必將 auth.session_secret_key 改為隨機產生的長字串
#     （例如執行：python -c "import secrets; print(secrets.token_hex(32))"）
# =============================================================================

server:
  host: "127.0.0.1"
  port: 8765

database:
  path: "./data/school_lib.db"

auth:
  default_admin_username: "admin"
  default_admin_password: "<change-me>"
  session_secret_key: "<generate-a-random-secret>"

source:
  local_culture_export_template: "./00_source/高雄市115年度○○區○○國小圖書館（室）充實本土文化相關圖書採購書單(空白).xlsx"

export:
  output_dir: "./exports"
  default_price_field: "purchase_price"
  default_subtotal_mode: "quantity_times_purchase_price"

export_templates:
  - name: "local_culture_kaohsiung_115"
    project_type: "local_culture"
    template_file_path: "./00_source/高雄市115年度○○區○○國小圖書館（室）充實本土文化相關圖書採購書單(空白).xlsx"
    header_row: 4
    data_start_row: 6
    max_rows: 50
    school_name_cell: "A3"
    approved_budget_cell: "E3"
    column_mappings:
      sort_order: "A"
      title: "B"
      author: "C"
      publisher: "D"
      isbn: "E"
      quantity: "F"
      price: "G"
      subtotal: "H"
      award_item: "I"
      notes: "J"
  - name: "general_books_kaohsiung_115"
    project_type: "general_books"
    template_file_path: "./00_source/高雄市115年度○○區○○國小圖書館（室）圖書採購書單(空白).xlsx"
    sheet_name: "正式書單"
    header_row: 4
    data_start_row: 6
    max_rows: 50
    school_name_cell: ""
    approved_budget_cell: ""
    column_mappings:
      eligibility_label: "A"
      sort_order: "B"
      title: "C"
      author: "D"
      publisher: "E"
      isbn: "F"
      quantity: "G"
      recommendation_source: "H"
      policy_topic: "I"
      price: "J"
      subtotal: "K"
      award_notes: "L"

default_project:
  name: "115年度採購"
  project_type: "local_culture"
  export_template_name: "local_culture_kaohsiung_115"
