    header_row: 4
    data_start_row: 6
    max_rows: 50
    school_name_cell: "A3"
    approved_budget_cell: "E3"
    column_mappings:
      sort_order: "A"
      title: "B"
      author: "C"
      publisher: "D"
      isbn: "E"
      quantity: "F"
      price: "G"
      subtotal: "H"
      award_item: "I"
      notes: "J"
