<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>比對結果 — 圖書採購系統</title>
<link rel="stylesheet" href="/css/style.css">
</head>
<body>
<nav>
  <div class="nav-inner">
    <span class="nav-title">圖書採購系統</span>
    <div class="nav-steps">
      <a href="/projects.html">採購專案</a>
      <a href="/import.html">匯入</a>
      <a href="/match.html" class="active">比對結果</a>
      <a href="/selection.html">選書</a>
      <a href="/export-check.html">匯出前檢查</a>
      <a href="/export.html">匯出</a>
      <a href="/holdings.html">館藏查詢</a>
    </div>
    <div class="nav-right"><span id="user-name"></span> <a href="#" onclick="logout()">登出</a></div>
  </div>
</nav>
<div class="page container">
  <div class="section-header">
    <div><h1>比對結果</h1><p class="subtitle" id="project-label">目前專案：載入中...</p></div>
    <div class="right"><button class="btn btn-secondary" onclick="runMatch()">重新比對</button></div>
  </div>

  <div class="stats-row" id="stats-row"></div>

  <div class="filter-bar">
    <label>比對狀態：</label>
    <select id="filter-match" onchange="loadBooks()">
      <option value="">全部</option>
      <option value="available">可採購</option>
      <option value="already_owned">已館藏</option>
    </select>
    <label>完整度：</label>
    <select id="filter-comp" onchange="loadBooks()">
      <option value="">全部</option>
      <option value="export_ready">可匯出</option>
      <option value="needs_review">需補資料</option>
      <option value="missing_required">缺必填</option>
    </select>
    <span id="result-count" style="font-size:13px;color:#666;margin-left:8px"></span>
  </div>

  <div class="card" style="padding:0">
    <div class="table-wrap">
      <table id="book-table">
        <thead>
          <tr>
            <th>書名</th><th>作者</th><th>出版社</th><th>ISBN</th>
            <th>獲獎項目</th><th>比對狀態</th><th>完整度</th>
          </tr>
        </thead>
        <tbody id="book-body"></tbody>
      </table>
    </div>
  </div>
</div>
<div id="toast"></div>
<script src="/js/common.js"></script>
<script>
let pid = null;

requireAuth().then(async () => {
  pid = getProjectId();
  if (!pid) { showToast('請先選擇採購專案'); return; }
  try {
    const proj = await api(`/api/projects/${pid}`);
    document.getElementById('project-label').textContent = `目前專案：${proj.name}`;
    await loadStats();
    await loadBooks();
  } catch {
    clearProject();
    showToast('請先選擇採購專案');
  }
});

async function loadStats() {
  const s = await api(`/api/books/stats?project_id=${pid}`);
  const ms = s.match_status || {};
  const cs = s.completeness_status || {};
  document.getElementById('stats-row').innerHTML = `
    <div class="stat-card green"><div class="num">${ms.available||0}</div><div class="label">可採購</div></div>
    <div class="stat-card gray"><div class="num">${ms.already_owned||0}</div><div class="label">已館藏</div></div>
    <div class="stat-card gray"><div class="num">${s.ignored_missing_isbn||0}</div><div class="label">已忽略缺ISBN</div></div>
    <div class="stat-card green"><div class="num">${cs.export_ready||0}</div><div class="label">可匯出</div></div>
    <div class="stat-card yellow"><div class="num">${cs.needs_review||0}</div><div class="label">需補資料</div></div>
    <div class="stat-card red"><div class="num">${cs.missing_required||0}</div><div class="label">缺必填</div></div>
  `;
}

async function loadBooks() {
  const ms = document.getElementById('filter-match').value;
  const cs = document.getElementById('filter-comp').value;
  let url = `/api/books/matches?project_id=${pid}`;
  if (ms) url += `&match_status=${ms}`;
  if (cs) url += `&completeness_status=${cs}`;
  const books = await api(url);
  document.getElementById('result-count').textContent = `共 ${books.length} 筆`;
  const tbody = document.getElementById('book-body');
  if (!books.length) {
    tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;color:#999;padding:40px">無資料</td></tr>';
    return;
  }
  tbody.innerHTML = books.map(b => {
    const overrides = JSON.parse(b.user_overrides || '{}');
    const title = overrides.title || b.title || '—';
    const author = overrides.author || b.author || '—';
    const publisher = overrides.publisher || b.publisher || '—';
    const isbn = b.isbn_normalized || b.isbn || '—';
    const award = overrides.award_item || b.award_item || '—';
    return `<tr>
      <td>${title}</td>
      <td>${author}</td>
      <td>${publisher}</td>
      <td style="font-size:12px">${isbn}</td>
      <td style="font-size:12px;max-width:160px;white-space:normal">${award}</td>
      <td>${badge(b.match_status || 'unknown')}</td>
      <td>${badge(b.completeness_status || 'unknown')}</td>
    </tr>`;
  }).join('');
}

async function runMatch() {
  if (!pid) return;
  const btn = event.target;
  btn.disabled = true;
  btn.textContent = '比對中...';
  try {
    const stats = await api('/api/books/run-match', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ project_id: pid })
    });
    showToast(`比對完成：可採購 ${stats.available||0} 本、已館藏 ${stats.already_owned||0} 本`);
    await loadStats();
    await loadBooks();
  } catch (e) {
    showToast('比對失敗：' + e.message);
  } finally {
    btn.disabled = false;
    btn.textContent = '重新比對';
  }
}
</script>
</body>
</html>
