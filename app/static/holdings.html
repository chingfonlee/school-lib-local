<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>館藏查詢 — 圖書採購系統</title>
<link rel="stylesheet" href="/css/style.css">
</head>
<body>
<nav>
  <div class="nav-inner">
    <span class="nav-title">圖書採購系統</span>
    <div class="nav-steps">
      <a href="/projects.html">採購專案</a>
      <a href="/import.html">匯入</a>
      <a href="/match.html">比對結果</a>
      <a href="/selection.html">選書</a>
      <a href="/export-check.html">匯出前檢查</a>
      <a href="/export.html">匯出</a>
      <a href="/holdings.html" class="active">館藏查詢</a>
    </div>
    <div class="nav-right"><span id="user-name"></span> <a href="#" onclick="logout()">登出</a></div>
  </div>
</nav>
<div class="page container">
  <div class="section-header">
    <div><h1>館藏查詢</h1><p class="subtitle">查詢學校既有館藏，確認是否已有某本書</p></div>
  </div>

  <div class="card" style="margin-bottom:16px">
    <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
      <input type="text" id="q-input" placeholder="通用搜尋（ISBN、書名、作者、出版社、書目識別號）"
        style="flex:1;min-width:200px" oninput="" onkeydown="handleKey(event)">
      <button class="btn btn-primary" id="search-btn" onclick="doSearch()">搜尋</button>
      <button class="btn btn-secondary" id="clear-btn" onclick="clearAll()">清除</button>
    </div>
    <details id="advanced-details" style="margin-top:12px">
      <summary style="cursor:pointer;font-size:13px;color:#6e6e73;user-select:none">進階搜尋（可與通用搜尋共同篩選）</summary>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px">
        <div>
          <label style="font-size:12px;color:#6e6e73;display:block;margin-bottom:3px">ISBN</label>
          <input type="text" id="isbn-input" placeholder="精準比對（可含連字號）" style="width:100%" onkeydown="handleKey(event)">
        </div>
        <div>
          <label style="font-size:12px;color:#6e6e73;display:block;margin-bottom:3px">書名</label>
          <input type="text" id="title-input" placeholder="包含查詢" style="width:100%" onkeydown="handleKey(event)">
        </div>
        <div>
          <label style="font-size:12px;color:#6e6e73;display:block;margin-bottom:3px">作者</label>
          <input type="text" id="author-input" placeholder="包含查詢" style="width:100%" onkeydown="handleKey(event)">
        </div>
        <div>
          <label style="font-size:12px;color:#6e6e73;display:block;margin-bottom:3px">出版社</label>
          <input type="text" id="publisher-input" placeholder="包含查詢" style="width:100%" onkeydown="handleKey(event)">
        </div>
        <div>
          <label style="font-size:12px;color:#6e6e73;display:block;margin-bottom:3px">書目識別號</label>
          <input type="text" id="library-record-id-input" placeholder="包含查詢" style="width:100%" onkeydown="handleKey(event)">
        </div>
      </div>
    </details>
  </div>

  <div id="result-info" style="font-size:13px;color:#6e6e73;margin-bottom:8px;display:none">
    共找到 <span id="result-count"></span> 筆館藏
  </div>
  <div id="empty-state" style="text-align:center;color:#999;padding:60px 0">請輸入搜尋條件</div>
  <div id="no-result-state" style="text-align:center;color:#999;padding:60px 0;display:none">找不到符合的館藏</div>
  <div id="error-state" style="text-align:center;color:#c0392b;padding:60px 0;display:none"></div>

  <div class="card" style="padding:0;display:none" id="results-card">
    <div class="table-wrap">
      <table id="results-table">
        <thead>
          <tr>
            <th>書名</th><th>作者</th><th>出版社</th><th>出版年</th>
            <th>ISBN</th><th>書目識別號</th><th>價格</th>
          </tr>
        </thead>
        <tbody id="results-body"></tbody>
      </table>
    </div>
  </div>
</div>
<div id="toast"></div>
<script src="/js/common.js"></script>
<script>
function esc(s) {
  if (s == null || s === '') return '—';
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

function showState(state) {
  document.getElementById('empty-state').style.display = state === 'empty' ? '' : 'none';
  document.getElementById('no-result-state').style.display = state === 'noresult' ? '' : 'none';
  document.getElementById('error-state').style.display = state === 'error' ? '' : 'none';
  document.getElementById('results-card').style.display = state === 'results' ? '' : 'none';
  document.getElementById('result-info').style.display = state === 'results' ? '' : 'none';
}

requireAuth().then(() => {
  loadFromUrl();
});

function loadFromUrl() {
  const p = new URLSearchParams(window.location.search);
  const q = p.get('q') || '';
  const isbn = p.get('isbn') || '';
  const title = p.get('title') || '';
  const author = p.get('author') || '';
  const publisher = p.get('publisher') || '';
  const lrid = p.get('library_record_id') || '';

  document.getElementById('q-input').value = q;
  document.getElementById('isbn-input').value = isbn;
  document.getElementById('title-input').value = title;
  document.getElementById('author-input').value = author;
  document.getElementById('publisher-input').value = publisher;
  document.getElementById('library-record-id-input').value = lrid;

  if (isbn || title || author || publisher || lrid) {
    document.getElementById('advanced-details').open = true;
  }

  if (q || isbn || title || author || publisher || lrid) {
    doSearch();
  }
}

async function doSearch() {
  const q = document.getElementById('q-input').value.trim();
  const isbn = document.getElementById('isbn-input').value.trim();
  const title = document.getElementById('title-input').value.trim();
  const author = document.getElementById('author-input').value.trim();
  const publisher = document.getElementById('publisher-input').value.trim();
  const lrid = document.getElementById('library-record-id-input').value.trim();

  if (!q && !isbn && !title && !author && !publisher && !lrid) {
    showState('empty');
    return;
  }

  const params = new URLSearchParams();
  if (q) params.set('q', q);
  if (isbn) params.set('isbn', isbn);
  if (title) params.set('title', title);
  if (author) params.set('author', author);
  if (publisher) params.set('publisher', publisher);
  if (lrid) params.set('library_record_id', lrid);

  try {
    const data = await api(`/api/holdings/search?${params}`);
    if (data.total === 0) {
      showState('noresult');
      return;
    }
    document.getElementById('result-count').textContent = data.total;
    document.getElementById('results-body').innerHTML = data.items.map(item => `<tr>
      <td>${esc(item.title)}</td>
      <td>${esc(item.author)}</td>
      <td>${esc(item.publisher)}</td>
      <td style="font-size:12px">${esc(item.publish_year)}</td>
      <td style="font-size:12px">${esc(item.isbn)}</td>
      <td style="font-size:12px">${esc(item.library_record_id)}</td>
      <td>${item.price != null ? formatCurrency(item.price) : '—'}</td>
    </tr>`).join('');
    showState('results');
  } catch (e) {
    document.getElementById('error-state').textContent = '查詢失敗：' + e.message;
    showState('error');
  }
}

function clearAll() {
  document.getElementById('q-input').value = '';
  document.getElementById('isbn-input').value = '';
  document.getElementById('title-input').value = '';
  document.getElementById('author-input').value = '';
  document.getElementById('publisher-input').value = '';
  document.getElementById('library-record-id-input').value = '';
  showState('empty');
}

function handleKey(e) {
  if (e.key === 'Enter') doSearch();
}
</script>
</body>
</html>
