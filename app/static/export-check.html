<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>匯出前檢查 — 圖書採購系統</title>
<link rel="stylesheet" href="/css/style.css">
</head>
<body>
<nav>
  <div class="nav-inner">
    <span class="nav-title">圖書採購系統</span>
    <div class="nav-steps">
      <a href="/projects.html"><span class="step-num">1</span>採購專案</a>
      <a href="/import.html"><span class="step-num">2</span>匯入</a>
      <a href="/match.html"><span class="step-num">3</span>比對結果</a>
      <a href="/selection.html"><span class="step-num">4</span>選書</a>
      <a href="/export-check.html" class="active"><span class="step-num">5</span>匯出前檢查</a>
      <a href="/export.html"><span class="step-num">6</span>匯出</a>
    </div>
    <a href="/holdings.html" class="nav-tool">館藏查詢</a>
    <div class="nav-right"><span id="user-name"></span> <a href="#" onclick="logout()">登出</a></div>
  </div>
</nav>
<div class="page container">
  <h1>匯出前置檢查</h1>
  <p class="subtitle" id="project-label">目前專案：載入中...</p>

  <div class="card">
    <div class="form-row" style="align-items:flex-end">
      <div class="form-group">
        <label>定價欄顯示</label>
        <select id="price-field" onchange="runCheck()">
          <option value="purchase_price">採購單價</option>
          <option value="list_price">定價</option>
        </select>
      </div>
      <div class="form-group">
        <label>小計計算方式</label>
        <select id="subtotal-mode" onchange="runCheck()">
          <option value="quantity_times_purchase_price">數量 × 採購單價</option>
          <option value="quantity_times_list_price">數量 × 定價</option>
        </select>
      </div>
      <div class="form-group" style="flex:none">
        <button class="btn btn-secondary" onclick="runCheck()">重新檢查</button>
      </div>
    </div>
  </div>

  <div class="stats-row" id="stats-row"></div>
  <div id="source-note" class="alert alert-info" style="display:none;margin-bottom:8px">
    部分書目的書商書單來源已清除，比對狀態以選書當時快照為準，不影響匯出準備度判斷。
  </div>
  <div id="alert-area"></div>

  <div class="card" style="padding:0">
    <div class="table-wrap">
      <table>
        <thead><tr>
          <th>書名</th><th>比對狀態</th><th>完整度</th><th>缺少必填</th><th>缺少建議欄位</th><th>操作</th>
        </tr></thead>
        <tbody id="detail-body"></tbody>
      </table>
    </div>
  </div>

  <div style="margin-top:20px;display:flex;align-items:center;gap:12px">
    <button id="export-btn" class="btn btn-primary" onclick="goExport()">繼續匯出</button>
    <span id="export-hint" style="font-size:13px;color:#6e6e73"></span>
  </div>
</div>
<div id="toast"></div>
<script src="/js/common.js"></script>
<script>
let pid = null;
let lastCheck = null;
let projectType = null;
let bookDataMap = {};

const H_ALLOWED = [
  '喜閱網',
  '文化部中小學生優良課外讀物選介',
  '好書大家讀',
  '金鼎獎',
  '文化部Books from Taiwan等具高公信力推薦價值之圖書',
  '國民中小學新生閱讀推動活動入選書單',
  '圖書分級推薦書目、臺灣歷史文化分級推薦書目',
  '其他國內外具公信力單位辦理之獎項(請備註獎項名稱)',
  '學校自選(請備註原因)',
];

requireAuth().then(async () => {
  pid = getProjectId();
  if (!pid) { showToast('請先選擇採購專案'); return; }
  let proj;
  try {
    proj = await api(`/api/projects/${pid}`);
  } catch {
    clearProject();
    showToast('請先選擇採購專案');
    return;
  }
  document.getElementById('project-label').textContent = `目前專案：${proj.name}`;
  projectType = proj.project_type;
  document.getElementById('price-field').value = proj.price_field;
  document.getElementById('subtotal-mode').value = proj.subtotal_mode;
  await runCheck();
});

async function runCheck() {
  if (!pid) return;
  const pf = document.getElementById('price-field').value;
  const sm = document.getElementById('subtotal-mode').value;
  const [data, selData] = await Promise.all([
    api(`/api/exports/check?project_id=${pid}&price_field=${pf}&subtotal_mode=${sm}`),
    api(`/api/selections/?project_id=${pid}`)
  ]);
  lastCheck = data;
  bookDataMap = {};
  selData.items.forEach(b => { bookDataMap[b.id] = b; });
  renderStats(data);
  renderDetails(data.details);
  renderHint(data);
  const hasCleared = selData.items.some(s => !s.vendor_book_still_exists);
  document.getElementById('source-note').style.display = hasCleared ? 'block' : 'none';
}

function renderStats(d) {
  document.getElementById('stats-row').innerHTML = `
    <div class="stat-card gray"><div class="num">${d.total_selected}</div><div class="label">已選書目</div></div>
    <div class="stat-card green"><div class="num">${d.export_ready}</div><div class="label">可匯出</div></div>
    <div class="stat-card yellow"><div class="num">${d.needs_review}</div><div class="label">需補資料</div></div>
    <div class="stat-card red"><div class="num">${d.missing_required}</div><div class="label">不可匯出</div></div>
    ${d.already_owned > 0 ? `<div class="stat-card gray"><div class="num">${d.already_owned}</div><div class="label">已館藏（異常）</div></div>` : ''}
  `;
}

function renderDetails(details) {
  const tbody = document.getElementById('detail-body');
  if (!details.length) {
    tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;color:#999;padding:40px">尚無選書</td></tr>';
    return;
  }
  tbody.innerHTML = details.map(d => {
    const isOwned = d.match_status === 'already_owned';
    const actionCell = isOwned ? '<td></td>' : `<td style="white-space:nowrap">
      <button class="btn btn-secondary btn-sm" onclick="removeBook(${d.sel_id})">移除</button>
      <button class="btn btn-secondary btn-sm" onclick="toggleCheckEdit(${d.sel_id}, ${d.vendor_book_id})" style="margin-left:4px">修正</button>
    </td>`;
    return `
    <tr>
      <td>${d.title || '—'}</td>
      <td>${badge(d.match_status)}</td>
      <td>${badge(d.completeness_status)}</td>
      <td class="missing-list">${d.missing_blocking_fields.length ? d.missing_blocking_fields.join('、') : '<span style="color:#1d8348">無</span>'}</td>
      <td class="missing-list">${d.missing_review_fields.length ? d.missing_review_fields.join('、') : '<span style="color:#1d8348">無</span>'}</td>
      ${actionCell}
    </tr>
    <tr id="check-edit-row-${d.sel_id}" style="display:none">
      <td colspan="6" style="padding:0;background:#f9f9f9">${buildEditForm(d.sel_id, d.vendor_book_id)}</td>
    </tr>`;
  }).join('');
}

function renderHint(d) {
  const btn = document.getElementById('export-btn');
  const hint = document.getElementById('export-hint');
  const alertArea = document.getElementById('alert-area');
  alertArea.innerHTML = '';

  if (d.missing_required > 0) {
    btn.className = 'btn btn-primary';
    hint.textContent = `有 ${d.missing_required} 本書缺少必填欄位，匯出後對應欄位將留空`;
    alertArea.innerHTML = `<div class="alert alert-warn">有 ${d.missing_required} 本書缺少必填欄位（ISBN無效/缺書名/缺定價），匯出後對應欄位將留空。可在下方表格直接修正欄位或移除書目。</div>`;
  } else if (d.needs_review > 0) {
    btn.className = 'btn btn-primary';
    hint.textContent = `有 ${d.needs_review} 本書缺少建議欄位，可繼續匯出`;
    alertArea.innerHTML = `<div class="alert alert-warn">有 ${d.needs_review} 本書缺少建議欄位（作者/出版社/獲獎項目），仍可匯出。</div>`;
  } else {
    btn.className = 'btn btn-primary';
    hint.textContent = d.total_selected > 0 ? '所有書目均可匯出' : '尚無選書';
  }
}

function goExport() {
  window.location.href = '/export.html';
}

function buildEditForm(selId, vendorBookId) {
  const b = bookDataMap[vendorBookId] || {};
  const ov = JSON.parse(b.user_overrides || '{}');
  const v = (field) => (ov[field] || b[field] || '').toString().replace(/"/g, '&quot;');
  const curElig = ov.eligibility_label || b.eligibility_label || '';
  const curRecSrc = ov.recommendation_source || b.recommendation_source || '';
  const eligOptions = ['', '必選', '推薦', '自選'].map(val =>
    `<option value="${val}" ${curElig === val ? 'selected' : ''}>${val || '（原始）'}</option>`).join('');
  const recSrcOptions = ['', ...H_ALLOWED].map(val =>
    `<option value="${val}" ${curRecSrc === val ? 'selected' : ''}>${val || '（原始）'}</option>`).join('');
  const generalFields = projectType === 'general_books' ? `
    <div class="field-row"><label>必選/推薦（A欄）</label><select data-check-bookid="${vendorBookId}" data-field="eligibility_label">${eligOptions}</select></div>
    <div class="field-row"><label>H欄推薦來源</label><select data-check-bookid="${vendorBookId}" data-field="recommendation_source">${recSrcOptions}</select></div>
    <div class="field-row"><label>備註（L欄）</label><input type="text" value="${v('award_notes')}" data-check-bookid="${vendorBookId}" data-field="award_notes"></div>` : '';
  return `<div class="inline-edit open" style="padding:12px 16px">
    <div class="field-row"><label>書名</label><input type="text" value="${v('title')}" data-check-bookid="${vendorBookId}" data-field="title"></div>
    <div class="field-row"><label>作者</label><input type="text" value="${v('author')}" data-check-bookid="${vendorBookId}" data-field="author"></div>
    <div class="field-row"><label>出版社</label><input type="text" value="${v('publisher')}" data-check-bookid="${vendorBookId}" data-field="publisher"></div>
    <div class="field-row"><label>獲獎項目</label><input type="text" value="${v('award_item')}" data-check-bookid="${vendorBookId}" data-field="award_item"></div>
    ${generalFields}
    <div class="field-row"><label>定價</label><input type="number" value="${v('list_price')}" data-check-bookid="${vendorBookId}" data-field="list_price"></div>
    <div class="field-row"><label>單價</label><input type="number" value="${v('purchase_price')}" data-check-bookid="${vendorBookId}" data-field="purchase_price"></div>
    <button class="btn btn-primary btn-sm" onclick="saveCheckEdit(${selId}, ${vendorBookId})">儲存修正</button>
    <button class="btn btn-secondary btn-sm" onclick="toggleCheckEdit(${selId}, ${vendorBookId})">取消</button>
  </div>`;
}

function toggleCheckEdit(selId, vendorBookId) {
  const row = document.getElementById('check-edit-row-' + selId);
  if (!row) return;
  row.style.display = row.style.display === 'none' ? '' : 'none';
}

async function removeBook(selId) {
  if (!confirm('確定從選書清單移除此書？')) return;
  try {
    await api(`/api/selections/${selId}`, { method: 'DELETE' });
    await runCheck();
  } catch (e) {
    showToast('移除失敗：' + e.message);
  }
}

async function saveCheckEdit(selId, vendorBookId) {
  const inputs = document.querySelectorAll(`[data-check-bookid="${vendorBookId}"]`);
  const overrides = {};
  inputs.forEach(inp => { overrides[inp.dataset.field] = inp.value.trim(); });
  try {
    await api(`/api/books/${vendorBookId}/overrides`, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ overrides })
    });
    const exportFields = ['eligibility_label', 'recommendation_source', 'award_notes'];
    const selOverrides = {};
    exportFields.forEach(f => { if (f in overrides) selOverrides[f] = overrides[f]; });
    if (Object.keys(selOverrides).length > 0) {
      await api(`/api/selections/${selId}/overrides`, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ overrides: selOverrides })
      });
    }
    showToast('修正已儲存');
    await runCheck();
  } catch (e) {
    showToast('儲存失敗：' + e.message);
  }
}
</script>
</body>
</html>
