<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>採購專案 — 圖書採購系統</title>
<link rel="stylesheet" href="/css/style.css">
</head>
<body>
<nav>
  <div class="nav-inner">
    <span class="nav-title">圖書採購系統</span>
    <div class="nav-steps">
      <a href="/projects.html" class="active"><span class="step-num">1</span>採購專案</a>
      <a href="/import.html"><span class="step-num">2</span>匯入</a>
      <a href="/match.html"><span class="step-num">3</span>比對結果</a>
      <a href="/selection.html"><span class="step-num">4</span>選書</a>
      <a href="/export-check.html"><span class="step-num">5</span>匯出前檢查</a>
      <a href="/export.html"><span class="step-num">6</span>匯出</a>
    </div>
    <a href="/holdings.html" class="nav-tool">館藏查詢</a>
    <a href="/admin-templates.html" class="nav-tool">範本管理</a>
    <div class="nav-right"><span id="user-name"></span> <a href="#" onclick="logout()">登出</a></div>
  </div>
</nav>
<div class="page container">
  <div class="section-header">
    <div><h1>採購專案</h1><p class="subtitle">選擇工作專案，或建立新專案</p></div>
    <div class="right"><button class="btn btn-primary" onclick="showNewForm()">+ 新增專案</button></div>
  </div>

  <div class="card" style="margin-bottom:16px;padding:16px 24px">
    <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap">
      <span style="font-size:14px;color:#555;font-weight:600">資料庫管理</span>
      <a href="/api/backup/database" class="btn btn-secondary btn-sm" onclick="handleBackupClick(event)">備份資料庫</a>
      <button class="btn btn-secondary btn-sm" onclick="showRestoreModal()">還原資料庫</button>
    </div>
  </div>

  <div id="new-form" class="card" style="display:none">
    <h2>新增採購專案</h2>
    <div class="form-row">
      <div class="form-group">
        <label>專案名稱</label>
        <input type="text" id="new-name" placeholder="例：115年度本土文化採購">
      </div>
      <div class="form-group">
        <label>採購類型</label>
        <select id="new-type">
          <option value="local_culture">國小 本土文化採購</option>
          <option value="general_books">國小 一般圖書採購</option>
          <option value="local_culture_jh">國中 本土文化採購</option>
          <option value="general_books_jh">國中 一般圖書採購</option>
        </select>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>定價欄顯示</label>
        <select id="new-price-field">
          <option value="purchase_price">採購單價</option>
          <option value="list_price">定價</option>
        </select>
      </div>
      <div class="form-group">
        <label>小計計算方式</label>
        <select id="new-subtotal">
          <option value="quantity_times_purchase_price">數量 × 採購單價</option>
          <option value="quantity_times_list_price">數量 × 定價</option>
        </select>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>專案預算（元）<span style="color:#888;font-size:12px;font-weight:400">（選填）</span></label>
        <input type="number" id="new-budget" placeholder="例：45000" min="0">
      </div>
    </div>
    <div style="display:flex;gap:8px">
      <button class="btn btn-primary" onclick="createProject()">建立</button>
      <button class="btn btn-secondary" onclick="hideNewForm()">取消</button>
    </div>
  </div>

  <div id="project-list"></div>

  <!-- Edit modal -->
  <div id="edit-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.3);z-index:200;display:flex;align-items:center;justify-content:center">
    <div class="card" style="width:480px;margin:0">
      <h2>編輯專案設定</h2>
      <input type="hidden" id="edit-id">
      <div class="form-group"><label>專案名稱</label><input type="text" id="edit-name"></div>
      <div class="form-group">
        <label>專案預算（元）<span style="color:#888;font-size:12px;font-weight:400">（選填）</span></label>
        <input type="number" id="edit-budget" min="0" placeholder="留空表示未設定">
      </div>
      <div class="form-group">
        <label>定價欄顯示</label>
        <select id="edit-price-field">
          <option value="purchase_price">採購單價</option>
          <option value="list_price">定價</option>
        </select>
      </div>
      <div class="form-group">
        <label>小計計算方式</label>
        <select id="edit-subtotal">
          <option value="quantity_times_purchase_price">數量 × 採購單價</option>
          <option value="quantity_times_list_price">數量 × 定價</option>
        </select>
      </div>
      <div style="display:flex;gap:8px">
        <button class="btn btn-primary" onclick="saveEdit()">儲存</button>
        <button class="btn btn-secondary" onclick="closeEdit()">取消</button>
      </div>
    </div>
  </div>

  <!-- Delete confirm modal -->
  <div id="delete-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.3);z-index:200;align-items:center;justify-content:center">
    <div class="card" style="width:460px;margin:0">
      <h2 style="color:#c0392b">確認刪除專案</h2>
      <p>即將刪除專案：<strong id="delete-project-name"></strong></p>
      <div id="delete-stats"></div>
      <div id="delete-current-warning" class="alert alert-warn" style="display:none;margin-top:8px">⚠ 這是目前使用中的專案。刪除後系統會清除目前使用狀態，請重新選擇專案。</div>
      <p style="color:#c0392b;font-size:13px;margin-top:8px">⚠ 刪除後無法復原，建議先備份資料庫。與此專案相關的所有資料（書目、選書、匯出紀錄）將永久刪除。</p>
      <div style="display:flex;gap:8px;margin-top:16px">
        <button id="delete-confirm-btn" class="btn btn-danger">確認刪除</button>
        <button class="btn btn-secondary" onclick="closeDeleteModal()">取消</button>
      </div>
    </div>
  </div>

  <!-- Restore modal -->
  <div id="restore-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.3);z-index:200;align-items:center;justify-content:center">
    <div class="card" style="width:480px;margin:0">
      <h2>還原資料庫</h2>
      <p style="color:#e67e22;font-size:13px">⚠ 還原將覆蓋目前所有資料。系統將在還原前自動建立安全備份。</p>
      <div class="form-group" style="margin-top:12px">
        <label>選擇備份檔（.db）</label>
        <input type="file" id="restore-file" accept=".db">
      </div>
      <div style="display:flex;gap:8px;margin-top:12px">
        <button class="btn btn-danger" onclick="doRestore()">確認還原</button>
        <button class="btn btn-secondary" onclick="closeRestoreModal()">取消</button>
      </div>
      <p id="restore-status" style="margin-top:8px;font-size:13px;color:#555"></p>
    </div>
  </div>
</div>
<div id="toast"></div>
<script src="/js/common.js"></script>
<script>
requireAuth().then(loadProjects);
document.getElementById('edit-modal').style.display = 'none';

async function loadProjects() {
  const projects = await api('/api/projects/');
  const el = document.getElementById('project-list');
  if (!projects.length) {
    el.innerHTML = '<div class="empty"><div class="icon">📋</div><p>尚無採購專案</p></div>';
    return;
  }
  const cur = getProjectId();
  el.innerHTML = projects.map(p => {
    const isCurrent = cur == p.id;
    const escapedName = p.name.replace(/'/g, "\\'");
    const fmtDate = iso => new Date(iso).toLocaleDateString('zh-TW');
    const fmtNum = n => Math.round(n).toLocaleString('zh-TW');
    let importRow;
    if (p.vendor_book_count === 0) {
      importRow = '尚未匯入書商書目';
    } else {
      const ownedStr = p.already_owned_count > 0 ? ` · 館藏重複 ${p.already_owned_count} 本` : '';
      const importDate = p.last_import ? `（${fmtDate(p.last_import)}）` : '';
      importRow = `書商書目 ${p.vendor_book_count} 本${importDate}${ownedStr}`;
    }
    const selRow = p.selection_count === 0
      ? '尚未選書'
      : `已選 ${p.selection_count} 本 · 小計 NT$ ${fmtNum(p.selection_amount)} 元`;
    let budgetRow;
    if (p.budget_amount == null) {
      budgetRow = '預算未設定';
    } else if (p.selection_amount === 0) {
      budgetRow = `預算 NT$ ${fmtNum(p.budget_amount)} 元（未使用）`;
    } else {
      const remaining = p.budget_amount - p.selection_amount;
      const pct = Math.round(p.selection_amount / p.budget_amount * 100);
      if (remaining >= 0) {
        budgetRow = `預算剩餘 NT$ ${fmtNum(remaining)} 元（已用 ${pct}%）`;
      } else {
        budgetRow = `預算超支 NT$ ${fmtNum(-remaining)} 元`;
      }
    }
    const exportRow = p.last_export
      ? `上次匯出 ${fmtDate(p.last_export)}`
      : '尚未匯出';
    return `
    <div class="project-card${isCurrent ? ' current' : ''}" onclick="selectCard(${p.id},'${escapedName}')">
      <div class="project-card-top">
        <div class="project-info">
          <div class="project-name">${p.name}${isCurrent ? ' <span class="badge badge-available">目前使用</span>' : ''}</div>
          <div class="project-meta">
            ${projectTypeLabel(p.project_type)} ·
            定價欄：${p.price_field === 'purchase_price' ? '採購單價' : '定價'} ·
            小計：${p.subtotal_mode === 'quantity_times_purchase_price' ? '數量×採購單價' : '數量×定價'}
          </div>
        </div>
        <div class="project-actions">
          <button class="btn btn-primary btn-sm" onclick="selectProject(event,${p.id},'${escapedName}')">選擇</button>
          <button class="btn btn-secondary btn-sm" onclick="openEdit(event,${p.id},'${escapedName}',${p.budget_amount},'${p.price_field}','${p.subtotal_mode}')">設定</button>
          <button class="btn btn-danger-outline btn-sm" onclick="confirmDelete(event,${p.id},'${escapedName}')">刪除</button>
        </div>
      </div>
      <div class="project-card-status">
        <div>${importRow}</div>
        <div>${selRow}</div>
        <div>${budgetRow}</div>
        <div>${exportRow}</div>
      </div>
      <div class="project-card-nav">
        <button class="btn btn-secondary btn-sm" onclick="goToStep(event,'/import.html',${p.id},'${escapedName}')">匯入</button>
        <button class="btn btn-secondary btn-sm" onclick="goToStep(event,'/selection.html',${p.id},'${escapedName}')">選書</button>
        <button class="btn btn-secondary btn-sm" onclick="goToStep(event,'/export-check.html',${p.id},'${escapedName}')">匯出前檢查</button>
        <button class="btn btn-secondary btn-sm" onclick="goToStep(event,'/export.html',${p.id},'${escapedName}')">匯出 Excel</button>
      </div>
    </div>
  `; }).join('');
}

function enterProject(id, name) {
  setProject(id, name);
  window.location.href = '/selection.html';
}

function goToStep(event, url, id, name) {
  event.stopPropagation();
  setProject(id, name);
  window.location.href = url;
}

function selectCard(id, name) {
  enterProject(id, name);
}

function selectProject(event, id, name) {
  event.stopPropagation();
  enterProject(id, name);
}

function showNewForm() { document.getElementById('new-form').style.display = 'block'; }
function hideNewForm() { document.getElementById('new-form').style.display = 'none'; }

async function createProject() {
  const name = document.getElementById('new-name').value.trim();
  if (!name) return showToast('請填入專案名稱');
  const budgetRaw = document.getElementById('new-budget').value;
  const budget = budgetRaw === '' ? null : parseFloat(budgetRaw);
  if (budget !== null && budget < 0) return showToast('預算不可為負數');
  await api('/api/projects/', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      name,
      project_type: document.getElementById('new-type').value,
      budget_amount: budget,
      price_field: document.getElementById('new-price-field').value,
      subtotal_mode: document.getElementById('new-subtotal').value,
    })
  });
  hideNewForm();
  showToast('專案已建立');
  loadProjects();
}

function openEdit(event, id, name, budget, pf, sm) {
  event.stopPropagation();
  document.getElementById('edit-id').value = id;
  document.getElementById('edit-name').value = name;
  document.getElementById('edit-budget').value = budget != null ? budget : '';
  document.getElementById('edit-price-field').value = pf;
  document.getElementById('edit-subtotal').value = sm;
  document.getElementById('edit-modal').style.display = 'flex';
}
function closeEdit() { document.getElementById('edit-modal').style.display = 'none'; }

async function saveEdit() {
  const id = document.getElementById('edit-id').value;
  const budgetRaw = document.getElementById('edit-budget').value;
  const budget = budgetRaw === '' ? null : parseFloat(budgetRaw);
  if (budget !== null && budget < 0) return showToast('預算不可為負數');
  await api(`/api/projects/${id}`, {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      name: document.getElementById('edit-name').value.trim(),
      budget_amount: budget,
      price_field: document.getElementById('edit-price-field').value,
      subtotal_mode: document.getElementById('edit-subtotal').value,
    })
  });
  closeEdit();
  showToast('已儲存');
  loadProjects();
}

// ---- 刪除 ----
async function confirmDelete(event, id, name) {
  event.stopPropagation();
  let preview;
  try {
    preview = await api(`/api/projects/${id}/delete-preview`);
  } catch (e) {
    showToast('無法取得刪除預覽：' + e.message);
    return;
  }
  document.getElementById('delete-project-name').textContent = preview.project_name;
  document.getElementById('delete-stats').innerHTML = `
    <ul style="margin:8px 0;padding-left:20px;color:#555;font-size:14px">
      <li>選書項目：${preview.selection_count} 筆</li>
      <li>匯出記錄：${preview.export_job_count} 筆</li>
      <li>匯入批次：${preview.import_batch_count} 批</li>
      <li>書商書目：${preview.vendor_book_count} 筆</li>
      <li>館藏紀錄：${preview.holding_count} 筆</li>
    </ul>`;
  document.getElementById('delete-current-warning').style.display = getProjectId() == id ? 'block' : 'none';
  document.getElementById('delete-confirm-btn').onclick = () => doDelete(id);
  document.getElementById('delete-modal').style.display = 'flex';
}

async function doDelete(id) {
  document.getElementById('delete-modal').style.display = 'none';
  try {
    await api(`/api/projects/${id}`, { method: 'DELETE' });
    if (getProjectId() == id) clearProject();
    showToast('專案已刪除');
    loadProjects();
  } catch (e) {
    showToast('刪除失敗：' + e.message);
  }
}

function closeDeleteModal() {
  document.getElementById('delete-modal').style.display = 'none';
}

// ---- 備份 ----
function handleBackupClick() {
  showToast('備份下載中...');
}

// ---- 還原 ----
function showRestoreModal() {
  document.getElementById('restore-file').value = '';
  document.getElementById('restore-status').textContent = '';
  document.getElementById('restore-modal').style.display = 'flex';
}

function closeRestoreModal() {
  document.getElementById('restore-modal').style.display = 'none';
}

async function doRestore() {
  const fileInput = document.getElementById('restore-file');
  if (!fileInput.files.length) return showToast('請選擇備份檔');
  const formData = new FormData();
  formData.append('file', fileInput.files[0]);
  document.getElementById('restore-status').textContent = '還原中，請稍候...';
  try {
    const res = await fetch('/api/backup/restore', {
      method: 'POST',
      body: formData,
      credentials: 'include',
    });
    if (!res.ok) {
      const err = await res.json().catch(() => ({ detail: '未知錯誤' }));
      document.getElementById('restore-status').textContent = '';
      showToast('還原失敗：' + err.detail, 5000);
      return;
    }
    const data = await res.json();
    document.getElementById('restore-status').textContent = data.message;
    showToast('還原成功！頁面即將重新整理', 4000);
    setTimeout(() => location.reload(), 3000);
  } catch (e) {
    document.getElementById('restore-status').textContent = '';
    showToast('還原失敗：' + e.message, 5000);
  }
}
</script>
</body>
</html>
