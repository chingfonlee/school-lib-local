<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>選書 — 圖書採購系統</title>
<link rel="stylesheet" href="/css/style.css">
</head>
<body>
<nav>
  <div class="nav-inner">
    <span class="nav-title">圖書採購系統</span>
    <div class="nav-steps">
      <a href="/projects.html">採購專案</a>
      <a href="/import.html">匯入</a>
      <a href="/match.html">比對結果</a>
      <a href="/selection.html" class="active">選書</a>
      <a href="/export-check.html">匯出前檢查</a>
      <a href="/export.html">匯出</a>
      <a href="/holdings.html">館藏查詢</a>
    </div>
    <div class="nav-right"><span id="user-name"></span> <a href="#" onclick="logout()">登出</a></div>
  </div>
</nav>
<div class="page container">
  <div class="section-header">
    <div><h1>選書</h1><p class="subtitle" id="project-label">目前專案：載入中...</p></div>
    <div class="right">
      <button class="btn btn-secondary btn-sm" onclick="clearAll()" style="color:#c0392b">清空選書</button>
    </div>
  </div>

  <div class="budget-bar" id="budget-bar">
    <div class="budget-item">
      <div class="label">已選書目</div>
      <div class="amount" id="budget-count">0</div>
    </div>
    <div class="budget-item">
      <div class="label">定價小計</div>
      <div class="amount" id="budget-list">NT$ 0</div>
    </div>
    <div class="budget-item">
      <div class="label">採購單價小計</div>
      <div class="amount" id="budget-purchase">NT$ 0</div>
    </div>
    <div style="margin-left:auto">
      <a href="/export-check.html" class="btn btn-primary btn-sm">前往匯出前檢查 →</a>
    </div>
  </div>

  <div class="filter-bar" style="flex-wrap:wrap;gap:6px 8px">
    <label>比對狀態：</label>
    <select id="filter-match" onchange="applyFilter()">
      <option value="">全部</option>
      <option value="available">可採購</option>
      <option value="already_owned">已館藏</option>
    </select>
    <label>完整度：</label>
    <select id="filter-comp" onchange="applyFilter()">
      <option value="">全部</option>
      <option value="export_ready">可匯出</option>
      <option value="needs_review">需補資料</option>
      <option value="missing_required">缺必填</option>
    </select>
    <label id="label-book-type">類型：</label>
    <select id="filter-book-type" onchange="applyFilter()"><option value="">全部</option></select>
    <label>年齡：</label>
    <select id="filter-age" onchange="applyFilter()"><option value="">全部</option></select>
    <input type="text" id="filter-category" placeholder="分類/議題..." oninput="applyFilter()" style="width:120px">
    <input type="number" id="filter-min-price" placeholder="最低價" oninput="applyFilter()" style="width:72px">
    <span style="color:#aaa">~</span>
    <input type="number" id="filter-max-price" placeholder="最高價" oninput="applyFilter()" style="width:72px">
    <input type="text" id="filter-text" placeholder="關鍵字搜尋..." oninput="applyFilter()" style="width:160px">
    <select id="filter-sort" onchange="applyFilter()">
      <option value="id">匯入順序</option>
      <option value="available_first">可採購優先</option>
      <option value="completeness_first">完整度優先</option>
      <option value="price_asc">價格低→高</option>
      <option value="price_desc">價格高→低</option>
      <option value="title">書名</option>
    </select>
    <button class="btn btn-secondary btn-sm" onclick="resetFilters()">重設篩選</button>
    <span id="result-count" style="font-size:13px;color:#666"></span>
  </div>

  <div id="book-grid" class="books-grid"></div>

  <div id="cleared-section" style="display:none;margin-top:32px">
    <h3 style="font-size:15px;color:#6e6e73;border-top:1px solid #e0e0e0;padding-top:20px;margin-bottom:12px">
      來源書單已清除 — 以下為保存的採購紀錄快照
    </h3>
    <div id="cleared-grid" class="books-grid"></div>
  </div>
</div>
<div id="toast"></div>
<script src="/js/common.js"></script>
<script>
let pid = null;
let allBooks = [];
let selMap = {};

requireAuth().then(async () => {
  pid = getProjectId();
  if (!pid) { showToast('請先選擇採購專案'); return; }
  let proj;
  try {
    proj = await api(`/api/projects/${pid}`);
  } catch {
    clearProject();
    showToast('請先選擇採購專案');
    return;
  }
  document.getElementById('project-label').textContent = `目前專案：${proj.name}`;
  await loadData();
});

async function loadData() {
  const [books, selData] = await Promise.all([
    api(`/api/books/matches?project_id=${pid}`),
    api(`/api/selections/?project_id=${pid}`)
  ]);
  allBooks = books;
  selMap = {};
  selData.items.forEach(s => { selMap[s.id] = s.selected_quantity; });
  const summary = selData.summary;
  document.getElementById('budget-count').textContent = summary.count;
  document.getElementById('budget-list').textContent = 'NT$ ' + formatCurrency(summary.total_list_price);
  document.getElementById('budget-purchase').textContent = 'NT$ ' + formatCurrency(summary.total_purchase_price);
  populateDynamicSelects();
  applyFilter();
  const clearedItems = selData.items.filter(s => !s.vendor_book_still_exists);
  renderClearedItems(clearedItems);
}

function populateDynamicSelects() {
  const populate = (id, values) => {
    const sel = document.getElementById(id);
    const cur = sel.value;
    sel.innerHTML = '<option value="">全部</option>' +
      [...new Set(values.filter(Boolean).map(v => String(v).trim()).filter(Boolean))]
        .sort((a, b) => a.localeCompare(b, 'zh-TW'))
        .map(v => `<option value="${v.replace(/"/g, '&quot;')}">${v}</option>`)
        .join('');
    if (cur) sel.value = cur;
  };
  populate('filter-book-type', allBooks.map(b => b.book_type));
  populate('filter-age', allBooks.map(b => b.age_range));

  const hasBookType = document.getElementById('filter-book-type').options.length > 1;
  document.getElementById('label-book-type').style.display = hasBookType ? '' : 'none';
  document.getElementById('filter-book-type').style.display = hasBookType ? '' : 'none';

  const hasCategoryData = allBooks.some(b => (b.category || '').trim() || (b.policy_topic || '').trim());
  document.getElementById('filter-category').style.display = hasCategoryData ? '' : 'none';
}

function getEffectiveMatchStatus(b) {
  return b.match_status || b.current_match_status || 'unknown';
}

function getEffectivePrice(b) {
  const pp = parseFloat(b.purchase_price);
  if (!isNaN(pp) && pp > 0) return pp;
  const lp = parseFloat(b.list_price);
  return isNaN(lp) ? null : lp;
}

function normalizeText(v) {
  return v ? String(v).toLowerCase() : '';
}

function includesKeyword(b, kw) {
  const k = normalizeText(kw);
  return [b.title, b.author, b.isbn, b.isbn_normalized, b.publisher,
          b.summary, b.category, b.book_type, b.policy_topic]
    .some(v => normalizeText(v).includes(k));
}

const COMPLETENESS_ORDER = { export_ready: 0, needs_review: 1, missing_required: 2, unknown: 3 };
const MATCH_ORDER = { available: 0, already_owned: 1, missing_isbn: 2, invalid_isbn: 3, unknown: 4 };

function compareBooks(a, b, sortMode) {
  switch (sortMode) {
    case 'available_first': {
      const da = MATCH_ORDER[getEffectiveMatchStatus(a)] ?? 5;
      const db = MATCH_ORDER[getEffectiveMatchStatus(b)] ?? 5;
      return da !== db ? da - db : a.id - b.id;
    }
    case 'completeness_first': {
      const da = COMPLETENESS_ORDER[a.completeness_status] ?? 4;
      const db = COMPLETENESS_ORDER[b.completeness_status] ?? 4;
      return da !== db ? da - db : a.id - b.id;
    }
    case 'price_asc': {
      const pa = getEffectivePrice(a), pb = getEffectivePrice(b);
      if (pa === null && pb === null) return a.id - b.id;
      if (pa === null) return 1;
      if (pb === null) return -1;
      return pa !== pb ? pa - pb : a.id - b.id;
    }
    case 'price_desc': {
      const pa = getEffectivePrice(a), pb = getEffectivePrice(b);
      if (pa === null && pb === null) return a.id - b.id;
      if (pa === null) return 1;
      if (pb === null) return -1;
      return pa !== pb ? pb - pa : a.id - b.id;
    }
    case 'title':
      return (a.title || '').localeCompare(b.title || '', 'zh-TW');
    default:
      return a.id - b.id;
  }
}

function applyFilter() {
  const matchVal = document.getElementById('filter-match').value;
  const comp = document.getElementById('filter-comp').value;
  const bookType = document.getElementById('filter-book-type').value;
  const ageRange = document.getElementById('filter-age').value;
  const category = document.getElementById('filter-category').value.trim();
  const minPrice = document.getElementById('filter-min-price').value;
  const maxPrice = document.getElementById('filter-max-price').value;
  const text = document.getElementById('filter-text').value.trim();
  const sortMode = document.getElementById('filter-sort').value;

  let filtered = allBooks;
  if (matchVal) filtered = filtered.filter(b => getEffectiveMatchStatus(b) === matchVal);
  if (comp) filtered = filtered.filter(b => b.completeness_status === comp);
  if (bookType) filtered = filtered.filter(b => (b.book_type || '') === bookType);
  if (ageRange) filtered = filtered.filter(b => (b.age_range || '') === ageRange);
  if (category) {
    const kc = normalizeText(category);
    filtered = filtered.filter(b =>
      normalizeText(b.category).includes(kc) || normalizeText(b.policy_topic).includes(kc)
    );
  }
  if (minPrice !== '') {
    const min = parseFloat(minPrice);
    if (!isNaN(min)) filtered = filtered.filter(b => { const p = getEffectivePrice(b); return p !== null && p >= min; });
  }
  if (maxPrice !== '') {
    const max = parseFloat(maxPrice);
    if (!isNaN(max)) filtered = filtered.filter(b => { const p = getEffectivePrice(b); return p !== null && p <= max; });
  }
  if (text) filtered = filtered.filter(b => includesKeyword(b, text));

  filtered = [...filtered].sort((a, b) => compareBooks(a, b, sortMode));
  document.getElementById('result-count').textContent = `共 ${filtered.length} 筆`;
  render(filtered);
}

function resetFilters() {
  ['filter-match', 'filter-comp', 'filter-book-type', 'filter-age', 'filter-sort']
    .forEach(id => { const s = document.getElementById(id); s.value = s.options[0].value; });
  ['filter-category', 'filter-min-price', 'filter-max-price', 'filter-text']
    .forEach(id => { document.getElementById(id).value = ''; });
  applyFilter();
}

function render(books) {
  const grid = document.getElementById('book-grid');
  if (!books.length) {
    grid.innerHTML = '<div style="text-align:center;color:#999;padding:60px 0">無符合條件的書目</div>';
    return;
  }
  grid.innerHTML = books.map(b => {
    const ov = JSON.parse(b.user_overrides || '{}');
    const title = ov.title || b.title || '—';
    const author = ov.author || b.author || '—';
    const isbn = b.isbn_normalized || b.isbn || '—';
    const lp = ov.list_price || b.list_price;
    const pp = ov.purchase_price || b.purchase_price;
    const award = ov.award_item || b.award_item || '';
    const qty = selMap[b.id] || 0;
    const holdingsUrl = b.isbn_normalized
      ? `/holdings.html?isbn=${encodeURIComponent(b.isbn_normalized)}`
      : `/holdings.html?q=${encodeURIComponent(b.title || '')}`;
    const extra = b.extra_fields ? (() => { try { return JSON.parse(b.extra_fields); } catch(e) { return null; } })() : null;
    const hasExtra = extra && Object.keys(extra).length > 0;
    const ctaBtn = qty > 0
      ? `<button class="book-cta" id="cta-${b.id}" disabled>已加入</button>`
      : `<button class="book-cta" id="cta-${b.id}" onclick="addBook(${b.id})">＋ 加入選書</button>`;
    const extraSection = hasExtra
      ? `<div id="extra-${b.id}" style="display:none;padding:8px 16px;font-size:12px;color:#444;background:#f5f5f7">
           ${Object.entries(extra).map(([k,v]) => `<span style="margin-right:12px"><span style="color:#6e6e73">${k}：</span>${v}</span>`).join('')}
         </div>`
      : '';
    return `
    <div class="book-card">
      <div class="book-card-body">
        <div class="book-card-title">${title}</div>
        <div class="book-card-meta">${author}</div>
        <div class="book-card-isbn">ISBN: ${isbn}</div>
        <div class="book-card-price">
          <span>定價 ${lp ? formatCurrency(lp) : '—'}</span>
          <span class="purchase">採購 ${pp ? formatCurrency(pp) : '—'}</span>
        </div>
        ${award ? `<div class="book-card-award">${award}</div>` : ''}
        <div style="margin-top:2px">${badge(b.completeness_status || 'unknown')}</div>
      </div>
      <div class="book-card-footer">
        <div class="book-card-links">
          <a href="#" onclick="toggleEdit(${b.id}); return false;">修正資料</a>
          <a href="${holdingsUrl}" target="_blank" rel="noopener">查館藏</a>
          ${hasExtra ? `<a href="#" onclick="toggleExtra(${b.id}); return false;">書商資訊</a>` : ''}
        </div>
        ${ctaBtn}
      </div>
      <div id="edit-${b.id}" class="book-card-edit" style="display:none">
        <div class="inline-edit open">
          <div class="field-row"><label>書名</label><input type="text" value="${(ov.title||b.title||'').replace(/"/g,'&quot;')}" data-field="title" data-bookid="${b.id}"></div>
          <div class="field-row"><label>作者</label><input type="text" value="${(ov.author||b.author||'').replace(/"/g,'&quot;')}" data-field="author" data-bookid="${b.id}"></div>
          <div class="field-row"><label>出版社</label><input type="text" value="${(ov.publisher||b.publisher||'').replace(/"/g,'&quot;')}" data-field="publisher" data-bookid="${b.id}"></div>
          <div class="field-row"><label>獲獎項目</label><input type="text" value="${(ov.award_item||b.award_item||'').replace(/"/g,'&quot;')}" data-field="award_item" data-bookid="${b.id}"></div>
          <div class="field-row"><label>定價</label><input type="number" value="${ov.list_price||b.list_price||''}" data-field="list_price" data-bookid="${b.id}"></div>
          <div class="field-row"><label>單價</label><input type="number" value="${ov.purchase_price||b.purchase_price||''}" data-field="purchase_price" data-bookid="${b.id}"></div>
          <button class="btn btn-primary btn-sm" onclick="saveOverrides(${b.id})">儲存修正</button>
          <button class="btn btn-secondary btn-sm" onclick="toggleEdit(${b.id})">取消</button>
        </div>
      </div>
      ${extraSection}
    </div>`;
  }).join('');
}

async function addBook(bookId) {
  try {
    await api('/api/selections/', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ project_id: pid, vendor_book_id: bookId, quantity: 1 })
    });
    selMap[bookId] = 1;
    await refreshBudget();
    const btn = document.getElementById('cta-' + bookId);
    if (btn) {
      btn.disabled = true;
      btn.textContent = '已加入';
      btn.onclick = null;
    }
  } catch (e) {
    showToast('加入失敗：' + e.message);
  }
}

async function refreshBudget() {
  const selData = await api(`/api/selections/?project_id=${pid}`);
  const s = selData.summary;
  document.getElementById('budget-count').textContent = s.count;
  document.getElementById('budget-list').textContent = 'NT$ ' + formatCurrency(s.total_list_price);
  document.getElementById('budget-purchase').textContent = 'NT$ ' + formatCurrency(s.total_purchase_price);
}

function toggleEdit(id) {
  const el = document.getElementById('edit-' + id);
  el.style.display = el.style.display === 'none' ? 'block' : 'none';
}

function toggleExtra(id) {
  const row = document.getElementById('extra-' + id);
  if (row) row.style.display = row.style.display === 'none' ? 'block' : 'none';
}

async function saveOverrides(bookId) {
  const inputs = document.querySelectorAll(`[data-bookid="${bookId}"]`);
  const overrides = {};
  inputs.forEach(inp => { overrides[inp.dataset.field] = inp.value.trim(); });
  try {
    await api(`/api/books/${bookId}/overrides`, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ overrides })
    });
    showToast('修正已儲存');
    toggleEdit(bookId);
    await loadData();
  } catch (e) {
    showToast('儲存失敗：' + e.message);
  }
}

function renderClearedItems(items) {
  const section = document.getElementById('cleared-section');
  const grid = document.getElementById('cleared-grid');
  if (!items.length) { section.style.display = 'none'; return; }
  section.style.display = 'block';
  grid.innerHTML = items.map(s => {
    const ov = JSON.parse(s.user_overrides || '{}');
    const title = ov.title || s.title || '—';
    const author = ov.author || s.author || '—';
    const isbn = s.isbn_normalized || s.isbn || '—';
    const lp = ov.list_price || s.list_price;
    const pp = ov.purchase_price || s.purchase_price;
    const award = ov.award_item || s.award_item || '';
    return `
    <div class="book-card" style="border-color:#d1d1d6;opacity:0.9">
      <div class="book-card-body">
        <div style="font-size:11px;color:#6e6e73;margin-bottom:4px">保存紀錄快照</div>
        <div class="book-card-title">${title}</div>
        <div class="book-card-meta">${author}</div>
        <div class="book-card-isbn">ISBN: ${isbn}</div>
        <div class="book-card-price">
          <span>定價 ${lp ? formatCurrency(lp) : '—'}</span>
          <span class="purchase">採購 ${pp ? formatCurrency(pp) : '—'}</span>
        </div>
        ${award ? `<div class="book-card-award">${award}</div>` : ''}
        <div style="margin-top:4px;font-size:12px;color:#6e6e73">數量：${s.selected_quantity}</div>
      </div>
      <div class="book-card-footer">
        <div class="book-card-links">
          <a href="#" onclick="toggleClearedEdit(${s.sel_id}); return false;">修正資料</a>
        </div>
      </div>
      <div id="cleared-edit-${s.sel_id}" class="book-card-edit" style="display:none">
        <div class="inline-edit open">
          <div class="field-row"><label>書名</label><input type="text" value="${(ov.title||s.title||'').replace(/"/g,'&quot;')}" data-field="title" data-selid="${s.sel_id}"></div>
          <div class="field-row"><label>作者</label><input type="text" value="${(ov.author||s.author||'').replace(/"/g,'&quot;')}" data-field="author" data-selid="${s.sel_id}"></div>
          <div class="field-row"><label>出版社</label><input type="text" value="${(ov.publisher||s.publisher||'').replace(/"/g,'&quot;')}" data-field="publisher" data-selid="${s.sel_id}"></div>
          <div class="field-row"><label>獲獎項目</label><input type="text" value="${(ov.award_item||s.award_item||'').replace(/"/g,'&quot;')}" data-field="award_item" data-selid="${s.sel_id}"></div>
          <div class="field-row"><label>定價</label><input type="number" value="${ov.list_price||s.list_price||''}" data-field="list_price" data-selid="${s.sel_id}"></div>
          <div class="field-row"><label>單價</label><input type="number" value="${ov.purchase_price||s.purchase_price||''}" data-field="purchase_price" data-selid="${s.sel_id}"></div>
          <button class="btn btn-primary btn-sm" onclick="saveSelectionOverrides(${s.sel_id})">儲存修正</button>
          <button class="btn btn-secondary btn-sm" onclick="toggleClearedEdit(${s.sel_id})">取消</button>
        </div>
      </div>
    </div>`;
  }).join('');
}

function toggleClearedEdit(selId) {
  const el = document.getElementById('cleared-edit-' + selId);
  el.style.display = el.style.display === 'none' ? 'block' : 'none';
}

async function saveSelectionOverrides(selId) {
  const inputs = document.querySelectorAll(`[data-selid="${selId}"]`);
  const overrides = {};
  inputs.forEach(inp => { overrides[inp.dataset.field] = inp.value.trim(); });
  try {
    await api(`/api/selections/${selId}/overrides`, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ overrides })
    });
    showToast('修正已儲存');
    toggleClearedEdit(selId);
    await loadData();
  } catch (e) {
    showToast('儲存失敗：' + e.message);
  }
}

async function clearAll() {
  if (!confirm('確定清空所有選書紀錄？')) return;
  await api(`/api/selections/?project_id=${pid}`, { method: 'DELETE' });
  selMap = {};
  showToast('已清空選書');
  await loadData();
}
</script>
</body>
</html>
