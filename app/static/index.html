<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>首頁 — 圖書採購系統</title>
<link rel="stylesheet" href="/css/style.css">
</head>
<body>
<nav>
  <div class="nav-inner">
    <span class="nav-title">圖書採購系統</span>
    <div class="nav-steps">
      <a href="/projects.html">採購專案</a>
      <a href="/import.html">匯入</a>
      <a href="/match.html">比對結果</a>
      <a href="/selection.html">選書</a>
      <a href="/export-check.html">匯出前檢查</a>
      <a href="/export.html">匯出</a>
      <a href="/holdings.html">館藏查詢</a>
    </div>
    <div class="nav-right"><span id="user-name"></span> <a href="#" onclick="logout()">登出</a></div>
  </div>
</nav>
<div class="page container">
  <h1>首頁</h1>
  <div id="project-banner" class="alert alert-info" style="margin-bottom:20px"></div>
  <div class="stats-row" id="stats-row">
    <div class="stat-card gray"><div class="num" id="stat-holdings">—</div><div class="label">館藏筆數</div></div>
    <div class="stat-card gray"><div class="num" id="stat-vendor">—</div><div class="label">書商書單</div></div>
    <div class="stat-card green"><div class="num" id="stat-available">—</div><div class="label">可採購</div></div>
    <div class="stat-card gray"><div class="num" id="stat-selection">—</div><div class="label">已選書</div></div>
    <div class="stat-card gray"><div class="num" id="stat-last-export">—</div><div class="label">上次匯出</div></div>
  </div>
  <div id="next-step-card" class="card" style="display:none;margin-top:16px">
    <h2>下一步</h2>
    <div id="next-step-content"></div>
  </div>
  <div class="card">
    <h2>快速導覽</h2>
    <div style="display:flex;gap:12px;flex-wrap:wrap;margin-top:8px">
      <a class="btn btn-secondary" href="/import.html">匯入書單</a>
      <a class="btn btn-secondary" href="/match.html">查看比對結果</a>
      <a class="btn btn-secondary" href="/selection.html">選書</a>
      <a class="btn btn-primary" href="/export.html">產生採購書單</a>
    </div>
  </div>
</div>
<div id="toast"></div>
<script src="/js/common.js"></script>
<script>
function renderNextStep(stats, selCount, readiness) {
  const card = document.getElementById('next-step-card');
  const el = document.getElementById('next-step-content');
  card.style.display = '';

  const holdings = stats.total_holdings || 0;
  const vendor = stats.total_vendor_books || 0;
  const available = (stats.match_status || {}).available || 0;

  if (holdings === 0) {
    el.innerHTML = '<p>尚未匯入館藏，建議先匯入館藏再繼續。</p>'
      + '<a class="btn btn-secondary" href="/import.html">前往匯入 →</a>';
    return;
  }
  if (vendor === 0) {
    el.innerHTML = '<p>尚未匯入書商書單。</p>'
      + '<a class="btn btn-secondary" href="/import.html">前往匯入 →</a>';
    return;
  }
  if (available === 0) {
    el.innerHTML = '<p>書商書單比對後無可採購書籍，請確認館藏內容是否完整。</p>'
      + '<a class="btn btn-secondary" href="/match.html">查看比對結果 →</a>';
    return;
  }
  if (selCount === 0) {
    el.innerHTML = `<p>有 <strong>${available}</strong> 本可採購，建議前往選書。</p>`
      + '<a class="btn btn-secondary" href="/selection.html">前往選書 →</a>';
    return;
  }
  let readyLine = '';
  if (readiness) {
    const r = readiness.export_ready || 0;
    const n = readiness.needs_review || 0;
    const m = readiness.missing_required || 0;
    readyLine = `<p style="margin:8px 0">
      <span class="badge badge-export_ready">就緒 ${r} 本</span>
      <span class="badge badge-needs_review">待補充 ${n} 本</span>
      <span class="badge badge-missing_required">缺必填 ${m} 本</span>
    </p>`;
  }
  el.innerHTML = `<p>已選 <strong>${selCount}</strong> 本書。</p>`
    + readyLine
    + '<a class="btn btn-secondary" href="/export-check.html">前往匯出前檢查 →</a>';
}

requireAuth().then(async () => {
  const pid = getProjectId();
  if (!pid) {
    document.getElementById('project-banner').textContent = '尚未選擇採購專案，請先到「採購專案」頁面選擇';
    document.getElementById('project-banner').className = 'alert alert-warn';
    return;
  }
  let proj;
  try {
    proj = await api(`/api/projects/${pid}`);
  } catch {
    clearProject();
    document.getElementById('project-banner').textContent = '請先選擇採購專案';
    document.getElementById('project-banner').className = 'alert alert-warn';
    return;
  }
  document.getElementById('project-banner').textContent =
    `目前專案：${proj.name}（${proj.project_type === 'local_culture' ? '本土文化採購' : '一般圖書採購'}）`;
  const [stats, selSummary, jobs] = await Promise.all([
    api(`/api/books/stats?project_id=${pid}`),
    api(`/api/selections/?project_id=${pid}`),
    api(`/api/exports/jobs?project_id=${pid}`),
  ]);
  document.getElementById('stat-holdings').textContent = stats.total_holdings || 0;
  document.getElementById('stat-vendor').textContent = stats.total_vendor_books || 0;
  document.getElementById('stat-available').textContent = (stats.match_status || {}).available || 0;
  document.getElementById('stat-selection').textContent = selSummary.summary.count || 0;
  if (jobs.length > 0) {
    const d = new Date(jobs[0].exported_at);
    document.getElementById('stat-last-export').textContent = d.toLocaleDateString('zh-TW');
  } else {
    document.getElementById('stat-last-export').textContent = '無';
  }
  const selCount = selSummary.summary.count || 0;
  let readiness = null;
  if (selCount > 0) {
    try {
      const pf = encodeURIComponent(proj.price_field || 'purchase_price');
      const sm = encodeURIComponent(proj.subtotal_mode || 'quantity_times_purchase_price');
      readiness = await api(`/api/exports/check?project_id=${pid}&price_field=${pf}&subtotal_mode=${sm}`);
    } catch { /* 不影響其他顯示 */ }
  }
  renderNextStep(stats, selCount, readiness);
});
</script>
</body>
</html>
