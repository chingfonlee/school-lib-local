name: Build Portable Package

on:
  release:
    types: [created]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download Python 3.12 embeddable
        run: |
          $ver = "3.12.10"
          Invoke-WebRequest "https://www.python.org/ftp/python/$ver/python-$ver-embed-amd64.zip" -OutFile python-embed.zip
          Expand-Archive python-embed.zip -DestinationPath python-embed

      - name: Enable site-packages in embedded Python
        run: |
          $pth = Get-ChildItem python-embed -Filter "python*._pth" | Select-Object -First 1
          (Get-Content $pth.FullName) -replace '#import site', 'import site' | Set-Content $pth.FullName

      - name: Install pip into embedded Python
        run: |
          Invoke-WebRequest "https://bootstrap.pypa.io/get-pip.py" -OutFile get-pip.py
          python-embed\python.exe get-pip.py -q --no-warn-script-location

      - name: Install app dependencies
        run: |
          python-embed\python.exe -m pip install -r requirements.txt -q --no-warn-script-location

      - name: Assemble portable package
        run: |
          $out = "school-lib-portable"
          New-Item -ItemType Directory $out

          Copy-Item python-embed "$out\python" -Recurse

          foreach ($item in @('app','docs','sample-data','config.example.yaml',
                               'setup_first_run.py','requirements.txt',
                               'LICENSE','README.md','CONTRIBUTING.md','SECURITY.md')) {
            if (Test-Path $item) { Copy-Item $item "$out\" -Recurse }
          }

          Copy-Item start-portable.bat "$out\start.bat"

      - name: Create ZIP
        run: Compress-Archive -Path school-lib-portable -DestinationPath school-lib-portable.zip

      - name: Upload to GitHub Release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ github.ref_name }}" school-lib-portable.zip

      - name: Upload artifact (for manual test run)
        uses: actions/upload-artifact@v4
        with:
          name: school-lib-portable
          path: school-lib-portable.zip
          retention-days: 7
